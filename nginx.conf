##
## CronManager — Configuração Nginx
## Copie este bloco para /etc/nginx/sites-available/cronmanager
## e crie o symlink: ln -s /etc/nginx/sites-available/cronmanager /etc/nginx/sites-enabled/
##

server {
    listen 80;
    server_name SEU_DOMINIO_OU_IP;   # ← substitua pelo seu domínio ou IP

    root /var/www/cronmanager/public; # ← caminho onde você colocou a pasta public/
    index index.php;

    charset utf-8;

    # Logs
    access_log /var/log/nginx/cronmanager_access.log;
    error_log  /var/log/nginx/cronmanager_error.log;

    # Rewrite: todas as requisições vão para index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        include        fastcgi_params;
        fastcgi_pass   unix:/run/php/php8.2-fpm.sock;  # ← ajuste para sua versão do PHP
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
    }

    # Bloquear acesso direto a arquivos sensíveis
    location ~ /\.(ht|git|env) {
        deny all;
    }

    # Cache de assets estáticos
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
